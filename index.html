<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lachlan Watts</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<!-- data-page tells the nav which tab to highlight -->
<body data-page="index">
  <div class="layout">

    <!-- Sidebar is filled in automatically from site.js -->
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <!-- Top tabs are filled in automatically from site.js -->
      <nav class="topnav" id="topnav"></nav>

      <section class="content">
        <!-- ============================================
             ABOUT ME  —  replace the placeholder text below
             ============================================ -->
        <h1>About Me</h1>

        <p>
          <!-- Write a short intro here: who you are, what you study,
               what you're interested in. A paragraph or two is plenty. -->
          Hi, I'm [your name]. Write your introduction here.
        </p>

        <h2>Interests</h2>
        <p>
          <!-- Optional: what you like working on, research areas, hobbies. -->
          Add your interests here.
        </p>

        <h2>Experience</h2>
        <p>
          <!-- Optional: a short summary of roles, clubs, or work.
               (Detailed history can live in your Resume tab.) -->
          Add a short summary here, or delete this section.
        </p>
      </section>
    </main>

  </div>
  <script src="site.js"></script>
</body>
</html>
